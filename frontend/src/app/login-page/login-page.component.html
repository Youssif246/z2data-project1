<div class="container">
  <div class="loginpage">
    <div class="texts">
      <h1>Sign in</h1>
      <p>Welcome back. Please enter your details.</p>
    </div>
    <div class="form">
      <form (ngSubmit)="doCheckLogin()" #form="ngForm">
        <div class="input">
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="you@example.com"
            required
          />
        </div>
        <div class="input">
          <label for="password">Password</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="your password"
            required
          />
        </div>
        <button type="submit">Sign in</button>
      </form>
    </div>
  </div>
</div>
